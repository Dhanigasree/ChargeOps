version: "3.9"

services:
  frontend:
    build:
      context: ../ev-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    restart: unless-stopped

  api-gateway:
    build:
      context: ./services/api-gateway
    ports:
      - "8000:8000"
    environment:
      PORT: ${API_GATEWAY_PORT:-8000}
      NODE_ENV: production
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      AUTH_SERVICE_URL: http://auth-service:8001
      USER_SERVICE_URL: http://user-service:8002
      STATION_SERVICE_URL: http://station-service:8003
      BOOKING_SERVICE_URL: http://booking-service:8004
      PAYMENT_SERVICE_URL: http://payment-service:8005
      REVIEW_SERVICE_URL: http://review-service:8006
      ADMIN_SERVICE_URL: http://admin-service:8007
    depends_on:
      - auth-service
      - user-service
      - station-service
      - booking-service
      - payment-service
      - review-service
      - admin-service
    restart: unless-stopped

  auth-service:
    build:
      context: ./services/auth-service
    ports:
      - "8001:8001"
    environment:
      PORT: 8001
      NODE_ENV: production
      MONGODB_URI: mongodb://auth-mongo:27017/ev-auth-service
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ALLOW_ADMIN_REGISTRATION: ${ALLOW_ADMIN_REGISTRATION:-false}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    depends_on:
      - auth-mongo
    restart: unless-stopped

  user-service:
    build:
      context: ./services/user-service
    ports:
      - "8002:8002"
    environment:
      PORT: 8002
      NODE_ENV: production
      MONGODB_URI: mongodb://user-mongo:27017/ev-user-service
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    depends_on:
      - user-mongo
    restart: unless-stopped

  station-service:
    build:
      context: ./services/station-service
    ports:
      - "8003:8003"
    environment:
      PORT: 8003
      NODE_ENV: production
      MONGODB_URI: mongodb://station-mongo:27017/ev-station-service
      JWT_SECRET: ${JWT_SECRET}
      AUTO_SEED_STATIONS: ${AUTO_SEED_STATIONS:-true}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    depends_on:
      - station-mongo
    restart: unless-stopped

  booking-service:
    build:
      context: ./services/booking-service
    ports:
      - "8004:8004"
    environment:
      PORT: 8004
      NODE_ENV: production
      MONGODB_URI: mongodb://booking-mongo:27017/ev-booking-service
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SERVICE_API_KEY: ${INTERNAL_SERVICE_API_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    depends_on:
      - booking-mongo
    restart: unless-stopped

  payment-service:
    build:
      context: ./services/payment-service
    ports:
      - "8005:8005"
    environment:
      PORT: 8005
      NODE_ENV: production
      MONGODB_URI: mongodb://payment-mongo:27017/ev-payment-service
      JWT_SECRET: ${JWT_SECRET}
      BOOKING_SERVICE_URL: http://booking-service:8004
      INTERNAL_SERVICE_API_KEY: ${INTERNAL_SERVICE_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_CURRENCY: ${STRIPE_CURRENCY:-usd}
      STRIPE_MIN_CHARGE_AMOUNT: ${STRIPE_MIN_CHARGE_AMOUNT:-0.5}
      FRONTEND_APP_URL: ${FRONTEND_APP_URL:-http://localhost:3000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    depends_on:
      - payment-mongo
      - booking-service
    restart: unless-stopped

  review-service:
    build:
      context: ./services/review-service
    ports:
      - "8006:8006"
    environment:
      PORT: 8006
      NODE_ENV: production
      MONGODB_URI: mongodb://review-mongo:27017/ev-review-service
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    depends_on:
      - review-mongo
    restart: unless-stopped

  admin-service:
    build:
      context: ./services/admin-service
    ports:
      - "8007:8007"
    environment:
      PORT: 8007
      NODE_ENV: production
      MONGODB_URI: mongodb://admin-mongo:27017/ev-admin-service
      JWT_SECRET: ${JWT_SECRET}
      USER_SERVICE_URL: http://user-service:8002
      STATION_SERVICE_URL: http://station-service:8003
      BOOKING_SERVICE_URL: http://booking-service:8004
      PAYMENT_SERVICE_URL: http://payment-service:8005
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    depends_on:
      - admin-mongo
      - user-service
      - station-service
      - booking-service
      - payment-service
    restart: unless-stopped

  auth-mongo:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - auth_mongo_data:/data/db
    restart: unless-stopped

  user-mongo:
    image: mongo:7
    ports:
      - "27019:27017"
    volumes:
      - user_mongo_data:/data/db
    restart: unless-stopped

  station-mongo:
    image: mongo:7
    ports:
      - "27020:27017"
    volumes:
      - station_mongo_data:/data/db
    restart: unless-stopped

  booking-mongo:
    image: mongo:7
    ports:
      - "27021:27017"
    volumes:
      - booking_mongo_data:/data/db
    restart: unless-stopped

  payment-mongo:
    image: mongo:7
    ports:
      - "27022:27017"
    volumes:
      - payment_mongo_data:/data/db
    restart: unless-stopped

  review-mongo:
    image: mongo:7
    ports:
      - "27023:27017"
    volumes:
      - review_mongo_data:/data/db
    restart: unless-stopped

  admin-mongo:
    image: mongo:7
    ports:
      - "27024:27017"
    volumes:
      - admin_mongo_data:/data/db
    restart: unless-stopped

volumes:
  auth_mongo_data:
  user_mongo_data:
  station_mongo_data:
  booking_mongo_data:
  payment_mongo_data:
  review_mongo_data:
  admin_mongo_data:
