apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: admin-service-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_ORG/YOUR_REPO
    targetRevision: dev
    path: k8s/dev/admin-service
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
