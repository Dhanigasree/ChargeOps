apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: chargeops
  namespace: prod
spec:
  gatewayClassName: kgateway
  infrastructure:
    parametersRef:
      group: gateway.kgateway.dev
      kind: GatewayParameters
      name: chargeops-prod-gateway-params
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: prod.chargeops.local
      allowedRoutes:
        namespaces:
          from: Same
