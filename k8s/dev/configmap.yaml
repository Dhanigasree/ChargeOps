apiVersion: v1
kind: ConfigMap
metadata:
  name: chargeops-config
  namespace: dev
data:
  NODE_ENV: development
  ALLOWED_ORIGINS: http://dev.chargeops.local
  JWT_EXPIRES_IN: 7d
  ALLOW_ADMIN_REGISTRATION: "true"
  AUTO_SEED_STATIONS: "true"
  STRIPE_CURRENCY: usd
  STRIPE_MIN_CHARGE_AMOUNT: "0.5"
  FRONTEND_APP_URL: http://dev.chargeops.local
  REACT_APP_API_URL: /api
  MONGO_HOST: mongodb
