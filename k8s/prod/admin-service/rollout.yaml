# IMAGE TAG WILL BE REPLACED BY CI PIPELINE
# DO NOT EDIT THE IMAGE LINE MANUALLY
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: admin-service
  namespace: prod
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: admin-service
  template:
    metadata:
      labels:
        app: admin-service
    spec:
      containers:
        - name: admin-service
          image: dockerhubusername/admin-service:latest
          ports:
            - name: http
              containerPort: 3000
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
  strategy:
    blueGreen:
      activeService: admin-service-active
      previewService: admin-service-preview
      autoPromotionEnabled: false
      scaleDownDelaySeconds: 120
      # prePromotionAnalysis:
      #   templates: []
      # postPromotionAnalysis:
      #   templates: []
