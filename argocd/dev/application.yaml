apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chargeops-dev-services
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Dhanigasree/ChargeOps.git
    targetRevision: develop
    path: argocd/dev/services
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
