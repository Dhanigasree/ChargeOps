apiVersion: v1
kind: ConfigMap
metadata:
  name: chargeops-config
  namespace: prod
data:
  NODE_ENV: production
  ALLOWED_ORIGINS: https://chargeops.example.com
  JWT_EXPIRES_IN: 7d
  ALLOW_ADMIN_REGISTRATION: "false"
  AUTO_SEED_STATIONS: "true"
  STRIPE_CURRENCY: usd
  STRIPE_MIN_CHARGE_AMOUNT: "0.5"
  FRONTEND_APP_URL: https://chargeops.example.com
  MONGO_HOST: mongodb
