apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chargeops-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Dhanigasree/ChargeOps.git
    targetRevision: main
    path: k8s-manifests/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
