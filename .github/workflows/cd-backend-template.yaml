# File: .github/workflows/cd-backend-template.yaml
name: Reusable CD Template — Backend (Node.js)

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      working_directory:
        required: true
        type: string
      k8s_manifest_path:
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.working_directory }}
          file: ${{ inputs.working_directory }}/Dockerfile
          push: true                                        # ✅ push on merge
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service }}:latest
          build-args: NODE_ENV=production
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-k8s-manifest:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in rollout.yaml
        run: |
          sed -i "s|image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service }}:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service }}:${{ github.sha }}|g" ${{ inputs.k8s_manifest_path }}

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add ${{ inputs.k8s_manifest_path }}
          git commit -m "ci: update ${{ inputs.service }} image to ${{ github.sha }} [skip ci]"
          git push