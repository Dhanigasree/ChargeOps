name: chargeops-trunk-ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

concurrency:
  group: chargeops-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            ev-frontend/package-lock.json
            ev-backend/services/*/package-lock.json

      - name: Build frontend
        working-directory: ev-frontend
        run: |
          npm ci
          npm run build

      - name: Lint frontend if script exists
        working-directory: ev-frontend
        run: npm run lint --if-present

      - name: Run frontend tests if script exists
        working-directory: ev-frontend
        run: npm test --if-present

      - name: Install backend dependencies
        shell: bash
        run: |
          services=(
            "ev-backend/services/api-gateway"
            "ev-backend/services/auth-service"
            "ev-backend/services/user-service"
            "ev-backend/services/station-service"
            "ev-backend/services/booking-service"
            "ev-backend/services/payment-service"
            "ev-backend/services/review-service"
            "ev-backend/services/admin-service"
          )

          for service in "${services[@]}"; do
            npm ci --prefix "$service"
          done

      - name: Validate backend JavaScript syntax
        shell: bash
        run: |
          services=(
            "ev-backend/services/api-gateway"
            "ev-backend/services/auth-service"
            "ev-backend/services/user-service"
            "ev-backend/services/station-service"
            "ev-backend/services/booking-service"
            "ev-backend/services/payment-service"
            "ev-backend/services/review-service"
            "ev-backend/services/admin-service"
          )

          for service in "${services[@]}"; do
            while IFS= read -r file; do
              node --check "$file"
            done < <(find "$service" -name '*.js' | sort)
            npm run lint --prefix "$service" --if-present
            npm test --prefix "$service" --if-present
          done

  sonarqube:
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != '' && secrets.SONAR_PROJECT_KEY != '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.projectName=ChargeOps
            -Dsonar.sources=ev-backend/services,ev-frontend/src
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**

      - name: SonarQube quality gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  snyk:
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ secrets.SNYK_TOKEN != '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Snyk
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Snyk scan frontend
        working-directory: ev-frontend
        run: snyk test --severity-threshold=high

      - name: Snyk scan backend services
        shell: bash
        run: |
          services=(
            "ev-backend/services/api-gateway"
            "ev-backend/services/auth-service"
            "ev-backend/services/user-service"
            "ev-backend/services/station-service"
            "ev-backend/services/booking-service"
            "ev-backend/services/payment-service"
            "ev-backend/services/review-service"
            "ev-backend/services/admin-service"
          )

          for service in "${services[@]}"; do
            snyk test --severity-threshold=high --file="$service/package.json" --package-manager=npm
          done

  build-and-scan:
    runs-on: ubuntu-latest
    needs:
      - validate
      - sonarqube
      - snyk
    if: ${{ always() && needs.validate.result == 'success' && (needs.sonarqube.result == 'success' || needs.sonarqube.result == 'skipped') && (needs.snyk.result == 'success' || needs.snyk.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: frontend
            context: ev-frontend
          - image: api-gateway
            context: ev-backend/services/api-gateway
          - image: auth-service
            context: ev-backend/services/auth-service
          - image: user-service
            context: ev-backend/services/user-service
          - image: station-service
            context: ev-backend/services/station-service
          - image: booking-service
            context: ev-backend/services/booking-service
          - image: payment-service
            context: ev-backend/services/payment-service
          - image: review-service
            context: ev-backend/services/review-service
          - image: admin-service
            context: ev-backend/services/admin-service
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize image owner
        id: vars
        shell: bash
        run: |
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build image locally
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          load: true
          push: false
          tags: ${{ env.REGISTRY }}/${{ steps.vars.outputs.owner }}/chargeops-${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.vars.outputs.owner }}/chargeops-${{ matrix.image }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ matrix.image }}

      - name: Log in to GHCR
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        shell: bash
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ steps.vars.outputs.owner }}/chargeops-${{ matrix.image }}"
          docker push "${IMAGE}:${{ github.sha }}"
          docker tag "${IMAGE}:${{ github.sha }}" "${IMAGE}:main"
          docker push "${IMAGE}:main"
