name: chargeops-ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: chargeops-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

# ─────────────────────────────────────────────
# Secrets required:
#   SONAR_TOKEN        - SonarQube auth token
#   SONAR_HOST_URL     - SonarQube server URL
#   SONAR_PROJECT_KEY  - SonarQube project key
#   SNYK_TOKEN         - Snyk auth token
#   DOCKERHUB_USERNAME - Docker Hub username
#   DOCKERHUB_TOKEN    - Docker Hub access token
#   MAIL_USERNAME      - Gmail address used to send
#   MAIL_PASSWORD      - Gmail App Password (not account password)
#   MAIL_TO            - Recipient email address
# ─────────────────────────────────────────────

jobs:

  # ── 1. VALIDATE ──────────────────────────────
  validate:
    name: Validate (build + lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            ev-frontend/package-lock.json
            ev-backend/services/*/package-lock.json

      - name: Build frontend
        working-directory: ev-frontend
        continue-on-error: true
        run: |
          npm ci
          npm run build

      - name: Lint & test frontend
        working-directory: ev-frontend
        continue-on-error: true
        run: |
          npm run lint --if-present
          npm test --if-present

      - name: Install + validate backend services
        continue-on-error: true
        shell: bash
        run: |
          services=(
            "ev-backend/services/auth-service"
            "ev-backend/services/user-service"
            "ev-backend/services/station-service"
            "ev-backend/services/booking-service"
            "ev-backend/services/payment-service"
            "ev-backend/services/review-service"
            "ev-backend/services/admin-service"
          )
          for service in "${services[@]}"; do
            npm ci --prefix "$service" || { echo "⚠ npm ci failed for $service — skipping"; continue; }
            while IFS= read -r file; do
              node --check "$file" || echo "⚠ syntax error in $file — skipping"
            done < <(find "$service" -name '*.js' | sort)
            npm run lint --prefix "$service" --if-present || echo "⚠ lint failed for $service — skipping"
            npm test --prefix "$service" --if-present   || echo "⚠ tests failed for $service — skipping"
          done

  # ── 2. SAST — SonarQube ──────────────────────
  sast:
    name: SAST (SonarQube)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.projectName=ChargeOps
            -Dsonar.sources=ev-backend/services,ev-frontend/src
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**

      - name: SonarQube quality gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ── 3. SCA — Snyk ────────────────────────────
  sca:
    name: SCA (Snyk)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Snyk
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Snyk scan frontend
        working-directory: ev-frontend
        run: |
          npm install
          snyk test --severity-threshold=high

      - name: Snyk scan backend services
        shell: bash
        run: |
          services=(
            "ev-backend/services/auth-service"
            "ev-backend/services/user-service"
            "ev-backend/services/station-service"
            "ev-backend/services/booking-service"
            "ev-backend/services/payment-service"
            "ev-backend/services/review-service"
            "ev-backend/services/admin-service"
          )
          for service in "${services[@]}"; do
            echo "──── Scanning $service ────"
            npm install --prefix "$service" || { echo "⚠ npm install failed for $service — skipping Snyk scan"; continue; }
            snyk test \
              --severity-threshold=high \
              --file="$service/package.json" \
              --package-manager=npm
          done

  # ── 4. BUILD → TRIVY SCAN → PUSH ─────────────
  build-scan-push:
    name: Build / Trivy / Push (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs:
      - sast
      - sca
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: frontend
            context: ev-frontend
          - image: auth-service
            context: ev-backend/services/auth-service
          - image: user-service
            context: ev-backend/services/user-service
          - image: station-service
            context: ev-backend/services/station-service
          - image: booking-service
            context: ev-backend/services/booking-service
          - image: payment-service
            context: ev-backend/services/payment-service
          - image: review-service
            context: ev-backend/services/review-service
          - image: admin-service
            context: ev-backend/services/admin-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image name
        id: vars
        run: |
          echo "image=${{ secrets.DOCKERHUB_USERNAME }}/chargeops-${{ matrix.image }}" >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          load: true
          push: false
          tags: ${{ steps.vars.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Trivy scan — fixed to v0.30.0 ──
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ${{ steps.vars.outputs.image }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ matrix.image }}

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          IMAGE="${{ steps.vars.outputs.image }}"
          docker push "${IMAGE}:${{ github.sha }}"
          docker tag  "${IMAGE}:${{ github.sha }}" "${IMAGE}:latest"
          docker push "${IMAGE}:latest"

  # ── 5. NOTIFY ─────────────────────────────────
  notify:
    name: Email notification
    runs-on: ubuntu-latest
    if: always()
    needs:
      - validate
      - sast
      - sca
      - build-scan-push
    steps:
      - name: Determine overall status
        id: status
        run: |
          VALIDATE="${{ needs.validate.result }}"
          SAST="${{ needs.sast.result }}"
          SCA="${{ needs.sca.result }}"
          BUILD="${{ needs.build-scan-push.result }}"

          echo "validate : $VALIDATE"
          echo "sast     : $SAST"
          echo "sca      : $SCA"
          echo "build    : $BUILD"

          if [[ "$VALIDATE" == "success" && "$SAST" == "success" && "$SCA" == "success" && "$BUILD" == "success" ]]; then
            echo "overall=success" >> "$GITHUB_OUTPUT"
            echo "subject=✅ ChargeOps CI passed — ${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "overall=failure" >> "$GITHUB_OUTPUT"
            echo "subject=❌ ChargeOps CI FAILED — ${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: ChargeOps CI <${{ secrets.MAIL_USERNAME }}>
          subject: ${{ steps.status.outputs.subject }}
          body: |
            ChargeOps CI Pipeline Result
            ─────────────────────────────
            Status    : ${{ steps.status.outputs.overall == 'success' && '✅ SUCCESS' || '❌ FAILURE' }}
            Branch    : ${{ github.ref_name }}
            Commit    : ${{ github.sha }}
            Triggered : ${{ github.event_name }}
            Actor     : ${{ github.actor }}

            Job results
            ─────────────────────────────
            Validate       : ${{ needs.validate.result }}
            SAST           : ${{ needs.sast.result }}
            SCA (Snyk)     : ${{ needs.sca.result }}
            Build/Scan/Push: ${{ needs.build-scan-push.result }}

            View run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}