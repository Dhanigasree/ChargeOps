name: chargeops-ci-cd

on:
  push:
    branches:
      - develop
      - main

permissions:
  contents: read
  packages: write
  security-events: write

concurrency:
  group: chargeops-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.vars.outputs.environment }}
      namespace: ${{ steps.vars.outputs.namespace }}
      overlay: ${{ steps.vars.outputs.overlay }}
      owner_lc: ${{ steps.vars.outputs.owner_lc }}
    steps:
      - name: Resolve deployment target
        id: vars
        shell: bash
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "environment=prod" >> "$GITHUB_OUTPUT"
            echo "namespace=prod" >> "$GITHUB_OUTPUT"
            echo "overlay=k8s-manifests/overlays/prod" >> "$GITHUB_OUTPUT"
          else
            echo "environment=dev" >> "$GITHUB_OUTPUT"
            echo "namespace=dev" >> "$GITHUB_OUTPUT"
            echo "overlay=k8s-manifests/overlays/dev" >> "$GITHUB_OUTPUT"
          fi
          echo "owner_lc=${OWNER_LC}" >> "$GITHUB_OUTPUT"

  quality-gate:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ev-frontend/package-lock.json

      - name: Build frontend
        working-directory: ev-frontend
        run: |
          npm ci
          npm run build

      - name: Validate backend JavaScript syntax
        shell: bash
        run: |
          services=(
            "ev-backend/services/api-gateway"
            "ev-backend/services/auth-service"
            "ev-backend/services/user-service"
            "ev-backend/services/station-service"
            "ev-backend/services/booking-service"
            "ev-backend/services/payment-service"
            "ev-backend/services/review-service"
            "ev-backend/services/admin-service"
          )

          for service in "${services[@]}"; do
            while IFS= read -r file; do
              node --check "$file"
            done < <(find "$service" -name '*.js' | sort)
          done

  build-and-scan:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - quality-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: chargeops-frontend
            context: ev-frontend
          - image: chargeops-api-gateway
            context: ev-backend/services/api-gateway
          - image: chargeops-auth-service
            context: ev-backend/services/auth-service
          - image: chargeops-user-service
            context: ev-backend/services/user-service
          - image: chargeops-station-service
            context: ev-backend/services/station-service
          - image: chargeops-booking-service
            context: ev-backend/services/booking-service
          - image: chargeops-payment-service
            context: ev-backend/services/payment-service
          - image: chargeops-review-service
            context: ev-backend/services/review-service
          - image: chargeops-admin-service
            context: ev-backend/services/admin-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.owner_lc }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.owner_lc }}/${{ matrix.image }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Upload Trivy scan result
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ matrix.image }}

  deploy:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-and-scan
    environment: ${{ needs.prepare.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Configure kubeconfig
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > "$HOME/.kube/config"

      - name: Create runtime secret
        shell: bash
        env:
          NAMESPACE: ${{ needs.prepare.outputs.namespace }}
        run: |
          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n "$NAMESPACE" create secret generic chargeops-secrets \
            --from-literal=MONGO_ROOT_USERNAME="${{ secrets.MONGO_ROOT_USERNAME }}" \
            --from-literal=MONGO_ROOT_PASSWORD="${{ secrets.MONGO_ROOT_PASSWORD }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=INTERNAL_SERVICE_API_KEY="${{ secrets.INTERNAL_SERVICE_API_KEY }}" \
            --from-literal=STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Inject image tags into overlay
        shell: bash
        env:
          OVERLAY: ${{ needs.prepare.outputs.overlay }}
          OWNER_LC: ${{ needs.prepare.outputs.owner_lc }}
          SHA_TAG: ${{ github.sha }}
          REGISTRY: ${{ env.REGISTRY }}
        run: |
          cd "$OVERLAY"
          kustomize edit set image chargeops-frontend=${REGISTRY}/${OWNER_LC}/chargeops-frontend:${SHA_TAG}
          kustomize edit set image chargeops-api-gateway=${REGISTRY}/${OWNER_LC}/chargeops-api-gateway:${SHA_TAG}
          kustomize edit set image chargeops-auth-service=${REGISTRY}/${OWNER_LC}/chargeops-auth-service:${SHA_TAG}
          kustomize edit set image chargeops-user-service=${REGISTRY}/${OWNER_LC}/chargeops-user-service:${SHA_TAG}
          kustomize edit set image chargeops-station-service=${REGISTRY}/${OWNER_LC}/chargeops-station-service:${SHA_TAG}
          kustomize edit set image chargeops-booking-service=${REGISTRY}/${OWNER_LC}/chargeops-booking-service:${SHA_TAG}
          kustomize edit set image chargeops-payment-service=${REGISTRY}/${OWNER_LC}/chargeops-payment-service:${SHA_TAG}
          kustomize edit set image chargeops-review-service=${REGISTRY}/${OWNER_LC}/chargeops-review-service:${SHA_TAG}
          kustomize edit set image chargeops-admin-service=${REGISTRY}/${OWNER_LC}/chargeops-admin-service:${SHA_TAG}

      - name: Deploy to Kubernetes
        shell: bash
        env:
          OVERLAY: ${{ needs.prepare.outputs.overlay }}
          NAMESPACE: ${{ needs.prepare.outputs.namespace }}
        run: |
          kubectl apply -k "$OVERLAY"
          for deployment in mongodb auth-service user-service station-service booking-service payment-service review-service admin-service api-gateway frontend; do
            kubectl rollout status deployment/"$deployment" -n "$NAMESPACE" --timeout=180s
          done
          kubectl get all -n "$NAMESPACE"
