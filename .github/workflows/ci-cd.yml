name: chargeops-ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: chargeops-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

# ─────────────────────────────────────────────
# Secrets required:
#   SONAR_TOKEN        - SonarQube auth token
#   SONAR_HOST_URL     - SonarQube server URL
#   SONAR_PROJECT_KEY  - SonarQube project key
#   SNYK_TOKEN         - Snyk auth token
#   DOCKERHUB_USERNAME - Docker Hub username
#   DOCKERHUB_TOKEN    - Docker Hub access token
# ─────────────────────────────────────────────

jobs:

  # ── 1. VALIDATE ──────────────────────────────
  validate:
    name: Validate (build + lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            ev-frontend/package-lock.json
            ev-backend/services/*/package-lock.json

      - name: Build frontend
        working-directory: ev-frontend
        run: |
          npm ci
          npm run build

      - name: Lint & test frontend
        working-directory: ev-frontend
        run: |
          npm run lint --if-present
          npm test --if-present

      - name: Install + validate backend services
        shell: bash
        run: |
          services=(
            "ev-backend/services/auth-service"
            "ev-backend/services/user-service"
            "ev-backend/services/station-service"
            "ev-backend/services/booking-service"
            "ev-backend/services/payment-service"
            "ev-backend/services/review-service"
            "ev-backend/services/admin-service"
          )
          for service in "${services[@]}"; do
            npm ci --prefix "$service"
            while IFS= read -r file; do
              node --check "$file"
            done < <(find "$service" -name '*.js' | sort)
            npm run lint --prefix "$service" --if-present
            npm test --prefix "$service" --if-present
          done

  # ── 2. SAST — SonarQube ──────────────────────
  sast:
    name: SAST (SonarQube)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.projectName=ChargeOps
            -Dsonar.sources=ev-backend/services,ev-frontend/src
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**

      - name: SonarQube quality gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 10
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ── 3. SCA — Snyk ────────────────────────────
  sca:
    name: SCA (Snyk)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Snyk
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Snyk scan frontend
        working-directory: ev-frontend
        run: snyk test --severity-threshold=high

      - name: Snyk scan backend services
        shell: bash
        run: |
          services=(
            "ev-backend/services/auth-service"
            "ev-backend/services/user-service"
            "ev-backend/services/station-service"
            "ev-backend/services/booking-service"
            "ev-backend/services/payment-service"
            "ev-backend/services/review-service"
            "ev-backend/services/admin-service"
          )
          for service in "${services[@]}"; do
            snyk test \
              --severity-threshold=high \
              --file="$service/package.json" \
              --package-manager=npm
          done

  # ── 4. BUILD → TRIVY SCAN → PUSH ─────────────
  build-scan-push:
    name: Build / Trivy / Push (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs:
      - sast
      - sca
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: frontend
            context: ev-frontend
          - image: auth-service
            context: ev-backend/services/auth-service
          - image: user-service
            context: ev-backend/services/user-service
          - image: station-service
            context: ev-backend/services/station-service
          - image: booking-service
            context: ev-backend/services/booking-service
          - image: payment-service
            context: ev-backend/services/payment-service
          - image: review-service
            context: ev-backend/services/review-service
          - image: admin-service
            context: ev-backend/services/admin-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image name
        id: vars
        run: |
          echo "image=${{ secrets.DOCKERHUB_USERNAME }}/chargeops-${{ matrix.image }}" >> "$GITHUB_OUTPUT"

      # ── Build locally (no push yet) ──
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          load: true
          push: false
          tags: ${{ steps.vars.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Trivy scan — fails on HIGH/CRITICAL ──
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.vars.outputs.image }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ matrix.image }}

      # ── Push to Docker Hub (main branch only) ──
      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          IMAGE="${{ steps.vars.outputs.image }}"
          docker push "${IMAGE}:${{ github.sha }}"
          docker tag  "${IMAGE}:${{ github.sha }}" "${IMAGE}:latest"
          docker push "${IMAGE}:latest"