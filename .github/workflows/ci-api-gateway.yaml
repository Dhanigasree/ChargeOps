# File: .github/workflows/ci-api-gateway.yaml
name: CI - api-gateway

on:
  pull_request:
    branches: [dev, main]
    paths: ["apps/api-gateway/**"]

jobs:
  ci:
    name: Run CI template
    uses: ./.github/workflows/ci-backend-template.yaml
    with:
      service: api-gateway
      working_directory: apps/api-gateway
      node_version: "20"
      test_command: "npm run test -- --coverage"
      sonar_project_base_dir: apps/api-gateway
      image_name: ${{ vars.DOCKERHUB_USERNAME }}/api-gateway
      pr_number: ${{ github.event.pull_request.number }}
      head_ref: ${{ github.head_ref }}
      actor: ${{ github.actor }}
      pr_url: ${{ github.event.pull_request.html_url }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
